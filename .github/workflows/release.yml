name: Release

on: workflow_dispatch

jobs:
  build-win-x64:
    runs-on: windows-2022
    permissions:
      contents: write
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
      - name: Setup MSYS2 and MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          # inherit lets MSYS2 see Cargo/Rust installed by the next step
          path-type: inherit
          cache: true
          update: true
          install: >-
            git
            zip
            unzip
            base-devel
            mingw-w64-x86_64-toolchain
      - uses: dtolnay/rust-toolchain@1.91
        with:
          target: x86_64-pc-windows-gnu
      - name: Get Version
        run: |
          git fetch --tags --prune --unshallow
          VERSION="$(git describe --tags --abbrev=0)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Build Windows
        run: cargo build --target x86_64-pc-windows-gnu --release --locked
      - name: Package Windows
        run: |
          unzip lib.zip
          mv target/x86_64-pc-windows-gnu/release/cream-cli.exe .
          zip -r cream-cli-${{ env.VERSION }}-windows.zip cream-cli.exe lib/
      - name: Upload Release Artifact - Windows
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            cream-cli-${{ env.VERSION }}-windows.zip

  build-mac-x64:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.75
      - name: Get Version
        run: |
          git fetch --tags --prune --unshallow
          VERSION="$(git describe --tags --abbrev=0)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Build MacOS
        run: cargo build --release --locked
      - name: Package MacOS
        run: |
          unzip lib.zip
          mv target/release/cream-cli .
          zip -r cream-cli-${{ env.VERSION }}-macos.zip cream-cli lib/
      - name: Upload Release Artifact - MacOS
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            cream-cli-${{ env.VERSION }}-macos.zip

  build-linux-x64:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.75
      - name: Get Version
        run: |
          git fetch --tags --prune --unshallow
          VERSION="$(git describe --tags --abbrev=0)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Build Linux
        run: cargo build --release --locked
      - name: Package Linux
        run: |
          unzip lib.zip
          mv target/release/cream-cli .
          zip -r cream-cli-${{ env.VERSION }}-linux.zip cream-cli lib/
      - name: Upload Release Artifact - Linux
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            cream-cli-${{ env.VERSION }}-linux.zip
